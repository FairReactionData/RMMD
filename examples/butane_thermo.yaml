# This file shows how the conformers of butane can be described in RMMD.
# It also shows how to link thermochemistry data to the conformers.
schema_version: 0.1.0b0
license: MIT
species:
  C4H10:
    names: ["Butane"]
    entities: [IJDNQMDRQITEOD-UHFFFAOYNA-N]
    thermo: [thermo:0, thermo:1, thermo:2]
entities:
  IJDNQMDRQITEOD-UHFFFAOYNA-N:
    constitution: {C: 4, H: 10}
    connectivity: {}
    identifiers:
      - type: "InChI"
        value: "InChI=1S/C4H10/c1-3-4-2/h3-4H2,1-2H3"
      - type: "InChIKey"
        value: "IJDNQMDRQITEOD-UHFFFAOYSA-N"
    conformations: [conformations:0, conformations:1]
thermo:
  - type: "Shomate"
    T_ranges:
      - [298.15, 1000]
      - [1000, 5000]
    coefficients:
      - [  3.000,  0.000, -1.200,  0.000,  0.000, -1.200,  0.000]
      - [  2.000,  0.000, -1.200,  0.000,  0.000, -1.200,  0.000]
    fitted_to: "calculations:4"  # fittet to entry 4 in the calculations list
  - type: "absolute tabular thermo"
    T: [298]
    p: [100_000]
    H: [[125.6]]
    sources: [pittam-1972]
    reference_state:         # this reference state indicated that we
      T: 298.15    # are using standard enthalpies of formation
      p: 100_000
      element_reference: "most stable form"
  - type: "tabular thermo"
    T: [50, 100, 150, 298.15]
    p: [100_000]
    Cp: [[38.07, 55.35, 67.32, 98.49]]
    sources: [chen-1975]
conformations:
  - calculations: [calculations:0, calculations:2]   # ids in the calculation list
    description: "trans conformer of butane"
  - calculations: [calculations:1, calculations:3]   # ids in the calculation list
    description: "gauche conformer of butane"
calculations:
  - type: qm-optimization+frequency
    software:
      name: "ORCA"
      version: "5.0.3"
    input:
      level_of_theory: "B3LYP-D3BJ/def2-TZVP"
      electronic_state: {charge: 0, spin: 0}
    output: ["./data/butane_opt_trans.log"]
  - type: qm-optimization+frequency
    input:
      level_of_theory: "B3LYP-D3BJ/def2-TZVP"
      electronic_state: {charge: 0, spin: 0}
    software:
      name: "ORCA"
      version: "5.0.3"
    output: ["./data/butane_opt_gauche.log"]
  - type: qm-energy
    input:
      level_of_theory: "DLPNO-CCSD(T)/cc-pVnZ-CBS"
      electronic_state: {charge: 0, spin: 0}
    software:
      name: "ORCA"
      version: "5.0.3"
    output: ["./data/butane_spe_trans.log"]
  - type: qm-energy
    input:
      level_of_theory: "DLPNO-CCSD(T)/cc-pVnZ-CBS"
      electronic_state: {charge: 0, spin: 0}
    software:
      name: "ORCA"
      version: "5.0.3"
    output: ["./data/butane_spe_gauche.log"]
  - type: "thermo-from QM"
    software:
      name: GoodVibes
      version: "3.2"
    input:
      conformations:   # In this thermochemistry calculation, both conformations are
                    # considered
        conformations:0:
          electronic_energy: calculations:2   # from calculation 2
          frequencies: calculations:0         # from calculation 0
          frequency_scaling: 0.99
          rot_symmetry_nr: 1
        conformations:1:
          degeneracy: 2
          electronic_energy: calculations:3
          frequencies: calculations:1
          frequency_scaling: 0.99
          rot_symmetry_nr: 1
      internal_rotors: Null   # no hindered rotor modeled
    output: Null   # here, we could reference tabular thermodynamic data in the thermo list
literature:
  pittam-1972:
    title: "Measurements of heats of combustion by flame calorimetry. Part 8.—Methane, ethane, propane, n-butane and 2-methylpropane"
    authors:
      - given-names: "D. A."
        family-names: "Pittam"
      - given-names: "G."
        family-names: "Pilcher"
    year: 1972
    doi: https://doi.org/10.1039/F19726802224
  chen-1975:
    title: "Ideal gas thermodynamic properties and isomerization of n-butane and isobutane"
    authors:
      - given-names: "S. S."
        family-names: "Chen"
      - given-names: "R. C."
        family-names: "Wilhoit"
      - given-names: "B. J."
        family-names: "Zwolinski"
    year: 1975
    doi: https://doi.org/10.1063/1.555526