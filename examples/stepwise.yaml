schema_version: 0.1.0b0
metadata:
  license: MIT
  title: Stepwise reactions example
  description: "This example shows how a stepwise reaction on the mechanism level can be
    defined."
species:
  NO2:
    entities: [JCXJVPUVTGWSNB-UHFFFAOYNA-N]
  "NO":   # disadvantage of using yaml -> NO without quotes is interpreted as False boolean value
    entities: [MWUXSHHQAYIFBG-UHFFFAOYNA-N]
  NO3:
    entities: [QWOQZJYJXQTVEN-UHFFFAOYSA-N]
  CO:
    entities: [UGFAIRIUMAVXCW-UHFFFAOYSA-N]
  CO2:
    entities: [CURLTUGMZLYLDI-UHFFFAOYSA-N]
reactions:
  - reactants: [NO2, CO]
    products: ["NO", CO2]
    # this overall reaction proceeds via two elementary steps defined below
    steps: [reactions:1, reactions:2]
  - reactants: [NO2, NO2]
    products: [NO3, "NO"]
    description: "Elementary step 1: NO2 + NO2 -> NO3 + NO"
  - reactants: [NO3, CO]
    products: [NO2, CO2]
    description: "Elementary step 2: NO3 + CO -> NO2 + CO2"
entities:
  JCXJVPUVTGWSNB-UHFFFAOYNA-N:
    inchi_fixedh:
        value: InChI=1/NO2/c2-1-3
    electronic_spin: "unkown-electronic-ground-state"
  MWUXSHHQAYIFBG-UHFFFAOYNA-N:
    inchi_fixedh:
        value: InChI=1/NO/c1-2
    electronic_spin: "unkown-electronic-ground-state"
  QWOQZJYJXQTVEN-UHFFFAOYSA-N:
    inchi_fixedh:
        value: InChI=1/NO3/c2-1(3)4
    electronic_spin: "unkown-electronic-ground-state"
  UGFAIRIUMAVXCW-UHFFFAOYSA-N:
    inchi_fixedh:
        value: InChI=1/CO/c1-2
    electronic_spin: "unkown-electronic-ground-state"
  CURLTUGMZLYLDI-UHFFFAOYSA-N:
    inchi_fixedh:
        value: InChI=1/CO2/c2-1-3
    electronic_spin: "unkown-electronic-ground-state"
