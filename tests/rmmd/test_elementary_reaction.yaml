--- # test setup
description: Test reaction validation
schema_part: species.Reaction
test_type: multiple
failures:
  - loc: [2]  # third reaction in here is invalid
    msg_pattern: 'Value error, Elementary reactions cannot have steps.*'
---
# valid step wise reaction
- reactants: [NO2, CO]
  products: ["NO", CO2]
  steps: [reactions:1, reactions:2]

# valid elementary reaction
- reactants: [NO2, NO2]
  products: [NO3, "NO"]
  type: elementary
  description: "Elementary step 1: NO2 + NO2 -> NO3 + NO"

# invalid: elementary and steps
- reactants: [NO3, CO]
  products: [NO2, CO2]
  type: elementary
  steps: [reactions:1, reactions:2]