--- # test setup
description: Contains all types of direct references with toy data.
schema_part: metadata.CitationKeyOrDirectReference
test_type: multiple
failures:
  - loc: [6, 'Doi']
    msg_pattern: 'String should match pattern .*'
  - loc: [7, 'CitationKey']
    msg_pattern: 'String should match pattern .*'
  - loc: [8, 'CitationKey']
    msg_pattern: 'String should match pattern .*'
  - loc: [9, 'CitationKey']
    msg_pattern: 'String should match pattern .*'
--- # actual examples
- "http://example.com/"                  # valid: http URL
- "https://example.com/path/to/file.txt" # valid: https URL
- "ftp://example.com/file.txt"           # valid: ftp URL
- "./path/to/local/file.txt"             # valid: relative local file
- "10.1234/abcd"                         # valid: CFF-style DOI
- "mycitation2024"                       # valid: citation key
- "10.xxx/abcd"                          # invalid: DOI with non-numeric prefix part
- "ssh://example.com/path"              # invalid: unsupported protocol
- "/absolute/path/to/file.txt"          # invalid: absolute path not allowed
- "file:///path/to/file.txt"            # invalid: file:// absolute path not allowed
